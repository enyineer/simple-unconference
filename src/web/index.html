    <style>
      /* No fixed colors here — the active design-system plugin owns the page
         background and text color (incl. dark mode). We just clear margins
         and set a system font for the pre-bundle fallback. */
      html, body { margin: 0; padding: 0; min-height: 100%; }
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
    </style>

    <script>
      // Capture `beforeinstallprompt` as early as possible. Chrome fires it once,
      // shortly after load — often BEFORE React mounts and the useInstallPrompt
      // hook can attach its own listener, so the event (and with it the native
      // install button) would be lost. Stash it on window for the hook to read on
      // mount, and re-dispatch a `bip-captured` event so an already-mounted hook
      // updates immediately. Mirror `appinstalled` so the stash clears on install.
      (function () {
        window.__deferredInstallPrompt = null;
        window.addEventListener("beforeinstallprompt", function (e) {
          e.preventDefault();
          window.__deferredInstallPrompt = e;
          window.dispatchEvent(new Event("bip-captured"));
        });
        window.addEventListener("appinstalled", function () {
          window.__deferredInstallPrompt = null;
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
