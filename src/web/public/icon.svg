<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Unconf">
  <!-- App mark: a room x slot grid with the current cell lit, echoing the
       Live Board layout. Dark ground + accent blue match the board palette
       (src/web/board/boardStyles.ts). -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="#0a0d12" />
  <g fill="none" stroke="rgba(88,166,255,0.4)" stroke-width="4">
    <rect x="88" y="88" width="96" height="96" rx="20" fill="rgba(88,166,255,0.16)" />
    <rect x="208" y="88" width="96" height="96" rx="20" fill="rgba(88,166,255,0.16)" />
    <rect x="328" y="88" width="96" height="96" rx="20" fill="rgba(88,166,255,0.16)" />
    <rect x="88" y="208" width="96" height="96" rx="20" fill="rgba(88,166,255,0.16)" />
    <rect x="328" y="208" width="96" height="96" rx="20" fill="rgba(88,166,255,0.16)" />
    <rect x="88" y="328" width="96" height="96" rx="20" fill="rgba(88,166,255,0.16)" />
    <rect x="208" y="328" width="96" height="96" rx="20" fill="rgba(88,166,255,0.16)" />
    <rect x="328" y="328" width="96" height="96" rx="20" fill="rgba(88,166,255,0.16)" />
  </g>
  <rect x="208" y="208" width="96" height="96" rx="20" fill="#58a6ff" />
</svg>
