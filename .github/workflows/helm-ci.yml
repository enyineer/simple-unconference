name: Helm CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: latest

      - name: Lint chart
        run: helm lint charts/simple-unconference

      - name: Render chart (sqlite default)
        run: helm template ci charts/simple-unconference >/dev/null

      - name: Render chart (postgres)
        run: |
          helm template ci charts/simple-unconference \
            --set database.type=postgres \
            --set database.postgres.host=pg.example \
            --set database.postgres.user=app \
            --set database.postgres.password=secret \
            --set database.postgres.database=unconf \
            >/dev/null

  # Fails the PR if charts/ was edited without a changeset. The release workflow
  # ties chart.version to package.json, so a chart change MUST come with a
  # changeset or it will not get a new chart version published.
  changeset-required-when-chart-changes:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check for chart changes without a changeset
        run: |
          BASE="origin/${{ github.base_ref }}"
          git fetch --no-tags --depth=50 origin "${{ github.base_ref }}"
          CHART_CHANGED=$(git diff --name-only "$BASE"...HEAD -- charts/ | wc -l)
          CHANGESET_ADDED=$(git diff --name-only --diff-filter=A "$BASE"...HEAD -- '.changeset/*.md' | grep -v 'README.md' | wc -l)
          echo "chart files changed: $CHART_CHANGED"
          echo "new changesets:      $CHANGESET_ADDED"
          if [ "$CHART_CHANGED" -gt 0 ] && [ "$CHANGESET_ADDED" -eq 0 ]; then
            echo "::error::charts/ was modified but no changeset was added. Run 'bun changeset' so the chart version gets bumped on release."
            exit 1
          fi
