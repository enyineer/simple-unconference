{{/*
Chart-managed Secret for the Web Push VAPID private key.

Rendered only when the private key is supplied inline via `webPush.privateKey`
(e.g. `--set-file webPush.privateKey=...` or a values file). When you instead
point `webPush.privateKeySecret` at a Secret you manage yourself, this template
is skipped and the deployment references your Secret directly.

Keeping the key in a Secret (rather than a plain env value on the Deployment)
means it isn't printed in `kubectl get deployment -o yaml`.
*/}}
{{- if and .Values.webPush .Values.webPush.privateKey (not (and .Values.webPush.privateKeySecret .Values.webPush.privateKeySecret.name)) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "simple-unconference.webPushSecretName" . }}
  labels:
    {{- include "simple-unconference.labels" . | nindent 4 }}
type: Opaque
stringData:
  VAPID_PRIVATE_KEY: {{ .Values.webPush.privateKey | quote }}
{{- end }}
