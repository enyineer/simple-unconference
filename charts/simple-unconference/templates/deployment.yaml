apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "simple-unconference.fullname" . }}
  labels:
    {{- include "simple-unconference.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: {{ .Values.strategy.type }}
  selector:
    matchLabels:
      {{- include "simple-unconference.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "simple-unconference.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        # Roll pods when DATABASE_URL changes.
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "simple-unconference.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
            {{- if and .Values.metrics .Values.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
            {{- end }}
          env:
            - name: PORT
              value: {{ .Values.service.targetPort | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "simple-unconference.secretName" . }}
                  key: {{ include "simple-unconference.secretKey" . }}
            {{- if .Values.auth.disableSignup }}
            - name: DISABLE_SIGNUP
              value: "1"
            {{- end }}
            {{- if and .Values.workers .Values.workers.count }}
            - name: WORKERS
              value: {{ .Values.workers.count | quote }}
            {{- end }}
            {{- with .Values.limits }}
            - name: MAX_CONFERENCES_PER_USER
              value: {{ .maxConferencesPerUser | quote }}
            - name: MAX_SESSIONS_PER_USER_PER_CONFERENCE
              value: {{ .maxSessionsPerUserPerConference | quote }}
            - name: MAX_PARTICIPANTS_PER_CONFERENCE
              value: {{ .maxParticipantsPerConference | quote }}
            - name: MAX_PENDING_INVITES_PER_CONFERENCE
              value: {{ .maxPendingInvitesPerConference | quote }}
            - name: MAX_ROOMS_PER_CONFERENCE
              value: {{ .maxRoomsPerConference | quote }}
            - name: LOGIN_FAIL_LIMIT
              value: {{ .loginFailLimit | quote }}
            - name: LOGIN_FAIL_WINDOW_MIN
              value: {{ .loginFailWindowMin | quote }}
            - name: LOGIN_LOCKOUT_MIN
              value: {{ .loginLockoutMin | quote }}
            - name: WRITES_PER_HOUR_PER_USER
              value: {{ .writesPerHourPerUser | quote }}
            - name: PASSWORD_RESET_TOKEN_TTL_MIN
              value: {{ .passwordResetTokenTtlMin | quote }}
            - name: PASSWORD_RESET_PER_HOUR_PER_EMAIL
              value: {{ .passwordResetPerHourPerEmail | quote }}
            - name: PASSWORD_RESET_PER_HOUR_PER_IP
              value: {{ .passwordResetPerHourPerIp | quote }}
            - name: EMAIL_VERIFY_CODE_TTL_MIN
              value: {{ .emailVerifyCodeTtlMin | quote }}
            - name: EMAIL_VERIFY_LINK_TTL_MIN
              value: {{ .emailVerifyLinkTtlMin | quote }}
            - name: VERIFY_RESEND_PER_HOUR_PER_EMAIL
              value: {{ .verifyResendPerHourPerEmail | quote }}
            - name: VERIFY_RESEND_PER_HOUR_PER_IP
              value: {{ .verifyResendPerHourPerIp | quote }}
            {{- end }}
            {{- if and .Values.email .Values.email.transport }}
            - name: EMAIL_TRANSPORT
              value: {{ .Values.email.transport | quote }}
            {{- end }}
            # Required: this instance's public origin. No default on the server
            # (a loopback default would ship broken email links), so the chart
            # fails the install if it's unset rather than letting the pod
            # crash-loop on boot.
            - name: APP_URL
              value: {{ required "email.appUrl is required: set it to this instance's public URL, e.g. https://unconf.example.com" (.Values.email).appUrl | quote }}
            {{- if and .Values.email .Values.email.from }}
            - name: EMAIL_FROM
              value: {{ .Values.email.from | quote }}
            {{- end }}
            {{- if and .Values.email .Values.email.resendApiKeySecret .Values.email.resendApiKeySecret.name }}
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.email.resendApiKeySecret.name | quote }}
                  key: {{ .Values.email.resendApiKeySecret.key | quote }}
            {{- else if and .Values.email .Values.email.resendApiKey }}
            - name: RESEND_API_KEY
              value: {{ .Values.email.resendApiKey | quote }}
            {{- end }}
            {{- with (.Values.email).smtp }}
            {{- with .url }}
            - name: SMTP_URL
              value: {{ . | quote }}
            {{- end }}
            {{- with .host }}
            - name: SMTP_HOST
              value: {{ . | quote }}
            {{- end }}
            {{- with .port }}
            - name: SMTP_PORT
              value: {{ . | quote }}
            {{- end }}
            {{- with .user }}
            - name: SMTP_USER
              value: {{ . | quote }}
            {{- end }}
            {{- with .secure }}
            - name: SMTP_SECURE
              value: {{ . | quote }}
            {{- end }}
            {{- if and .passwordSecret .passwordSecret.name }}
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ .passwordSecret.name | quote }}
                  key: {{ .passwordSecret.key | quote }}
            {{- else if .password }}
            - name: SMTP_PASS
              value: {{ .password | quote }}
            {{- end }}
            {{- end }}
            {{- if and .Values.turnstile .Values.turnstile.siteKey }}
            - name: TURNSTILE_SITE_KEY
              value: {{ .Values.turnstile.siteKey | quote }}
            {{- end }}
            {{- if and .Values.turnstile .Values.turnstile.secretKey }}
            - name: TURNSTILE_SECRET_KEY
              value: {{ .Values.turnstile.secretKey | quote }}
            {{- end }}
            {{- if and .Values.metrics .Values.metrics.enabled }}
            - name: METRICS_PORT
              value: {{ .Values.metrics.port | quote }}
            {{- end }}
            {{- if and .Values.metrics .Values.metrics.token }}
            - name: METRICS_TOKEN
              value: {{ .Values.metrics.token | quote }}
            {{- end }}
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.probes.liveness.enabled }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          {{- end }}
          {{- if .Values.probes.readiness.enabled }}
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if and (eq .Values.database.type "sqlite") .Values.database.sqlite.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.database.sqlite.mountPath }}
          {{- end }}
      {{- if and (eq .Values.database.type "sqlite") .Values.database.sqlite.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "simple-unconference.pvcName" . }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
