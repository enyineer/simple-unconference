{{/*
Only render the Secret when we're managing it ourselves, i.e. either
- database.type == sqlite (we own the file: URL), or
- database.type == postgres and no existingSecret was provided.
*/}}
{{- $managed := or (eq .Values.database.type "sqlite") (not .Values.database.postgres.existingSecret) -}}
{{- if $managed -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "simple-unconference.secretName" . }}
  labels:
    {{- include "simple-unconference.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ include "simple-unconference.databaseUrl" . | quote }}
{{- end }}
