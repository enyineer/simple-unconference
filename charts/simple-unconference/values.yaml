# Default values for simple-unconference.

image:
  repository: ghcr.io/enyineer/simple-unconference
  # If empty, defaults to .Chart.AppVersion.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

# Replicas. NOTE: with sqlite + an RWO PVC this MUST stay at 1.
replicaCount: 1

# Recreate is required for sqlite so the old pod releases the volume before
# the new one starts. Switch to RollingUpdate when running on postgres.
strategy:
  type: Recreate

service:
  type: ClusterIP
  port: 80
  # Container listens on 3000 (see Dockerfile / src/server/index.ts).
  targetPort: 3000
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: unconference.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

database:
  # "sqlite" or "postgres".
  #
  # WARNING: the app currently uses @prisma/adapter-libsql and the Prisma
  # schema is pinned to provider = "sqlite". Setting type=postgres wires
  # DATABASE_URL only; you must also switch the adapter (e.g. to
  # @prisma/adapter-pg) and regenerate migrations for the postgres provider.
  type: sqlite

  sqlite:
    persistence:
      enabled: true
      # 5Gi gives a public instance comfortable headroom — ~150 fully-saturated
      # 2000-attendee events at the per-row math in docs/loadtest-results.md.
      # Bump higher if your event mix skews bigger or you keep historical
      # conferences around.
      size: 5Gi
      storageClass: ""
      accessMode: ReadWriteOnce
      # Reuse an existing PVC instead of creating one.
      existingClaim: ""
    # Mount path inside the container. Matches the Dockerfile VOLUME.
    mountPath: /app/data
    # SQLite file name inside mountPath.
    fileName: prod.sqlite

  postgres:
    # Provide one of:
    #   1) url:               full DATABASE_URL (e.g. postgresql://u:p@h:5432/db?sslmode=require)
    #   2) host/port/...:     chart will assemble the URL
    #   3) existingSecret:    pull the URL from a pre-existing Secret
    url: ""
    host: ""
    port: 5432
    user: ""
    password: ""
    database: ""
    sslmode: require
    existingSecret: ""
    existingSecretKey: DATABASE_URL

# Number of Bun worker processes inside the container. Workers share the
# listening port via SO_REUSEPORT, so this fans out a single pod without
# adding replicas (SQLite mode requires replicaCount=1).
#
# Values:
#   "1"     - single in-process server. No fork. Default and safest.
#   "auto"  - derive from cgroup-reported CPU + memory limits.
#             Rule: workers = min(round(cpu_cores), floor(mem_MiB / 192), 8).
#             So 2000m+1Gi -> 2, 4000m+1Gi -> 4, 500m+512Mi -> 1.
#   "<N>"   - force exactly N (clamped to 8).
#
# Bump resources.limits.memory by ~150Mi for each additional worker beyond
# the first; each Bun process has its own runtime + Prisma client baseline.
workers:
  count: "1"

# Auth-related toggles. These map to environment variables on the container.
auth:
  # Disable global user signup (the owner-side account creation on the
  # login page). Existing users can still sign in; the signup form is
  # hidden in the UI and the API returns 403 if called directly.
  # Per-conference participant signup (joining a single conference) is
  # unaffected and remains controlled by the conference's own settings.
  disableSignup: false

# Per-account / per-conference quotas. Each maps to an env var on the
# container. Set any value to 0 to disable the corresponding cap (useful
# for private deployments). Defaults target a free public instance hosting
# events up to ~2000 attendees with ~5 sessions per user.
limits:
  maxConferencesPerUser: 3                # MAX_CONFERENCES_PER_USER
  maxSessionsPerUserPerConference: 5      # MAX_SESSIONS_PER_USER_PER_CONFERENCE
  maxParticipantsPerConference: 2500      # MAX_PARTICIPANTS_PER_CONFERENCE
  maxPendingInvitesPerConference: 2500    # MAX_PENDING_INVITES_PER_CONFERENCE
  maxRoomsPerConference: 100              # MAX_ROOMS_PER_CONFERENCE
  # Per-email failed-login lockout (NAT-blind; safe with venue WLAN).
  loginFailLimit: 5                       # LOGIN_FAIL_LIMIT (0 disables)
  loginFailWindowMin: 15                  # LOGIN_FAIL_WINDOW_MIN
  loginLockoutMin: 15                     # LOGIN_LOCKOUT_MIN
  # Per-account sliding-window write rate. 600/hour is well above any real
  # interactive user; catches scripted abuse from a compromised account.
  writesPerHourPerUser: 600               # WRITES_PER_HOUR_PER_USER (0 disables)
  # Forgot-password throttle + reset-link lifetime.
  passwordResetTokenTtlMin: 30            # PASSWORD_RESET_TOKEN_TTL_MIN
  passwordResetPerHourPerEmail: 3         # PASSWORD_RESET_PER_HOUR_PER_EMAIL (0 disables)
  # Off by default: NAT-blind, like the login lockout. A venue shares one
  # public IP, so a per-IP cap would lock out attendees resetting their
  # per-conference passwords. Per-email + Turnstile are the real defenses.
  # Set a positive value only if your users aren't behind a shared NAT.
  passwordResetPerHourPerIp: 0            # PASSWORD_RESET_PER_HOUR_PER_IP (0 disables)
  # Email-verification code/link lifetimes + resend throttle. Verification only
  # applies to global accounts, so the per-IP cap is safe to keep on.
  emailVerifyCodeTtlMin: 15               # EMAIL_VERIFY_CODE_TTL_MIN
  emailVerifyLinkTtlMin: 30               # EMAIL_VERIFY_LINK_TTL_MIN
  verifyResendPerHourPerEmail: 5          # VERIFY_RESEND_PER_HOUR_PER_EMAIL (0 disables)
  verifyResendPerHourPerIp: 20            # VERIFY_RESEND_PER_HOUR_PER_IP (0 disables)

# Transactional email (password-reset + email verification + account linking).
# Pick a transport. With no real transport (transport: none/blank and no key),
# delivery is a no-op (links logged), and email verification + cross-conference
# account linking are switched OFF - everything else still works. Set appUrl to
# your real public origin or links will point at localhost.
email:
  transport: ""  # EMAIL_TRANSPORT: resend | smtp | memory | none (blank = auto)
  # REQUIRED. This instance's public origin (APP_URL). No server-side default -
  # the chart install fails if this is empty. e.g. https://unconf.example.com
  appUrl: ""
  # EMAIL_FROM, e.g. "Unconf <noreply@example.com>". REQUIRED when the Resend
  # transport is active (transport: resend, or blank transport with a Resend
  # key set) - the install fails without it. The onboarding@resend.dev default
  # only delivers to the Resend account owner's own address (sandbox mode).
  from: ""
  # --- Resend (transport: resend) ---
  resendApiKey: ""  # RESEND_API_KEY (plain). Prefer resendApiKeySecret below.
  resendApiKeySecret:
    name: ""     # Secret name (takes precedence over resendApiKey when set)
    key: ""      # Key within that Secret
  # --- SMTP (transport: smtp), via nodemailer ---
  smtp:
    url: ""      # SMTP_URL (overrides the discrete fields below when set)
    host: ""     # SMTP_HOST
    port: ""     # SMTP_PORT (default 587)
    user: ""     # SMTP_USER
    password: ""        # SMTP_PASS (plain). Prefer passwordSecret below.
    passwordSecret:
      name: ""   # Secret name (takes precedence over password when set)
      key: ""    # Key within that Secret
    secure: ""   # SMTP_SECURE: "true"/"false"

# Cloudflare Turnstile (CAPTCHA). When BOTH keys are set the server requires
# a valid token on auth.signup, auth.login, and conferences.signupViaLink.
# Leave both empty for a no-op deployment. Per-conference logins and invite
# claims are NOT gated by Turnstile by design — see README.
turnstile:
  siteKey: ""    # TURNSTILE_SITE_KEY (sent to clients; safe to expose)
  secretKey: ""  # TURNSTILE_SECRET_KEY (used server-side to verify tokens)

# Web Push (OS-level notifications). Set BOTH keys to enable the opt-in in the
# notification bell; leave empty for a no-op. Generate a keypair with
# `bun run scripts/gen-vapid.ts`, then keep it STABLE - rotating the pair
# invalidates every existing browser subscription. The public key is sent to
# clients (safe to expose); the private key is a secret.
#
# Two ways to supply the private key:
#   1. privateKey - set it here (e.g. `--set-file webPush.privateKey=priv.txt`).
#      The chart stores it in a managed Secret (<release>-webpush) and the
#      Deployment references it via secretKeyRef, so it's never a plaintext env
#      on the pod spec.
#   2. privateKeySecret - point at a Secret you manage yourself. When its
#      `name` is set it takes precedence and the chart-managed Secret is skipped.
webPush:
  publicKey: ""   # VAPID_PUBLIC_KEY (sent to clients; safe to expose)
  privateKey: ""  # VAPID_PRIVATE_KEY (stored in a chart-managed Secret)
  privateKeySecret:
    name: ""      # Existing Secret name (takes precedence over privateKey)
    key: ""       # Key within that Secret
  # VAPID_SUBJECT: mailto: address or https: URL. Blank defaults to appUrl (when
  # https) or a mailto placeholder.
  subject: ""

# Prometheus-compatible /metrics endpoint. Served on a DEDICATED port
# (metrics.port, default 9090) — never on the main API port — so the chart's
# main Service can stay public-only while metrics scraping stays in-cluster.
# A separate headless ClusterIP Service (<release>-metrics) is created to
# expose this port to Prometheus / ServiceMonitor.
#
# Auth is open by default; set `token` to require `Authorization: Bearer <token>`
# if your scrape path crosses a less-trusted network.
metrics:
  enabled: true          # set false to disable metrics entirely (omits the port + Service)
  port: 9090             # METRICS_PORT — internal container port, not exposed on the main Service
  token: ""              # METRICS_TOKEN (empty = open endpoint)
  serviceMonitor:
    enabled: false       # set true only if prometheus-operator is installed
    interval: 30s
    scrapeTimeout: 10s
    labels: {}           # extra labels for the ServiceMonitor (e.g. release: kube-prometheus-stack)
  # Starter PrometheusRule with health, storage, and moderation alerts.
  # Requires prometheus-operator CRDs (same prerequisite as serviceMonitor).
  # Operators tune `chatReportsBacklogThreshold` to their moderation team's
  # capacity; everything else is derived from absolute health signals.
  prometheusRule:
    enabled: false
    labels: {}           # extra labels (e.g. release: kube-prometheus-stack) so Prometheus picks the rule up
    chatReportsBacklogThreshold: 10
  # Starter Grafana dashboard shipped as a ConfigMap. Requires a Grafana
  # instance running the dashboards sidecar (kube-prometheus-stack does this
  # by default). The sidecar watches all namespaces for ConfigMaps carrying
  # `grafana_dashboard: "1"` and imports their JSON automatically.
  #
  # If your Grafana lives in a different namespace AND the sidecar is scoped
  # to a single namespace, set `namespace:` to the Grafana namespace so the
  # ConfigMap lands where the sidecar looks.
  dashboard:
    enabled: false
    namespace: ""         # leave empty to install alongside the app; set to Grafana's namespace if sidecar is namespace-scoped
    label: grafana_dashboard
    labelValue: "1"
    extraLabels: {}       # e.g. { app: kube-prometheus-stack }
    folder: ""            # Grafana folder name (becomes the `grafana_folder` annotation); empty = General

# Extra env vars appended to the container.
# Example: [{ name: SERVE_STATIC, value: "1" }]
env: []

resources: {}
  # limits:
  #   cpu: 500m
  #   memory: 512Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

nodeSelector: {}
tolerations: []
affinity: {}

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 1000

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  readOnlyRootFilesystem: false
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

serviceAccount:
  create: true
  name: ""
  annotations: {}

# Probes hit /api/health (mirrors the Dockerfile HEALTHCHECK).
probes:
  liveness:
    enabled: true
    initialDelaySeconds: 20
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
